<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >
  <meta name="theme-color" content="#15182a">

  <title>Achievementy dospělosti</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --background: #0d1020;
      --panel: #181c31;
      --panel-light: #242943;
      --panel-dark: #111528;
      --text: #f7f8ff;
      --muted: #aab1cc;
      --accent: #8d7bff;
      --accent-light: #b8adff;
      --green: #45d7a0;
      --red: #ff7184;
      --yellow: #ffc65c;
      --border: rgba(255, 255, 255, 0.08);
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family:
        Inter,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      background:
        radial-gradient(circle at top right, #302b63 0, transparent 35%),
        linear-gradient(160deg, #0b0e1b, #15192d 55%, #0e1120);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(100%, 1050px);
      margin: 0 auto;
      padding:
        max(18px, env(safe-area-inset-top))
        14px
        max(45px, env(safe-area-inset-bottom));
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(27px, 7vw, 43px);
      line-height: 1.05;
    }

    h2 {
      margin: 0;
      font-size: 20px;
    }

    .subtitle {
      margin-top: 7px;
      color: var(--muted);
      font-size: 14px;
    }

    .status {
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    .online {
      color: var(--green);
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .top-grid {
      grid-template-columns: 1.05fr 0.95fr;
    }

    .card {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(24, 28, 49, 0.96);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .ghost-button,
    .primary-button,
    .danger-button {
      padding: 11px 13px;
      border-radius: 13px;
      color: var(--text);
      font-weight: 750;
    }

    .ghost-button {
      background: var(--panel-light);
    }

    .primary-button {
      background: linear-gradient(135deg, var(--accent), #6f5be9);
    }

    .danger-button {
      background: #44202b;
      color: #ffb3bd;
    }

    .leader {
      display: grid;
      grid-template-columns: 50px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
    }

    .leader:last-child {
      border-bottom: 0;
    }

    .avatar {
      display: grid;
      width: 45px;
      height: 45px;
      place-items: center;
      overflow: hidden;
      border-radius: 15px;
      background: var(--panel-light);
      font-size: 27px;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .member-name {
      font-weight: 850;
    }

    .member-title {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .member-points {
      font-size: 21px;
      font-weight: 900;
    }

    label {
      display: block;
      margin: 9px 0 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      padding: 12px;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 13px;
      outline: none;
      background: var(--panel-dark);
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 9px;
      margin-top: 12px;
    }

    .action {
      position: relative;
      min-height: 78px;
      padding: 12px;
      color: var(--text);
      border-radius: 15px;
      background: var(--panel-light);
      text-align: left;
      transition:
        transform 0.12s ease,
        background 0.12s ease;
    }

    .action:active {
      transform: scale(0.97);
      background: #303653;
    }

    .action strong {
      display: block;
      padding-right: 38px;
      font-size: 14px;
    }

    .action small {
      display: block;
      margin-top: 5px;
      color: var(--muted);
    }

    .action-points {
      position: absolute;
      top: 9px;
      right: 10px;
      color: var(--green);
      font-weight: 900;
    }

    .history-card {
      margin-top: 14px;
    }

    .history {
      display: grid;
      max-height: 420px;
      gap: 8px;
      overflow-y: auto;
    }

    .event {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 11px;
      border-radius: 13px;
      background: var(--panel-dark);
    }

    .event-note,
    .event-time {
      color: var(--muted);
      font-size: 12px;
    }

    .event-points {
      color: var(--green);
      font-weight: 900;
    }

    .empty {
      padding: 20px 0;
      color: var(--muted);
      text-align: center;
    }

    dialog {
      width: min(94vw, 570px);
      max-height: 88vh;
      padding: 18px;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--panel);
      overflow-y: auto;
    }

    dialog::backdrop {
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 15px;
    }

    .pin-box {
      text-align: center;
    }

    .pin-input {
      max-width: 230px;
      margin: 10px auto 0;
      font-size: 25px;
      letter-spacing: 8px;
      text-align: center;
    }

    .profile-row {
      display: grid;
      grid-template-columns: 50px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .profile-row:last-child {
      border-bottom: 0;
    }

    .toast {
      position: fixed;
      z-index: 100;
      bottom: 25px;
      left: 50%;
      width: max-content;
      max-width: 90vw;
      padding: 12px 16px;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #090d19;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 25px);
      transition: 0.25s ease;
      text-align: center;
    }

    .toast.visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .level-bar {
      height: 6px;
      margin-top: 6px;
      overflow: hidden;
      border-radius: 999px;
      background: #0e1222;
    }

    .level-progress {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--green));
    }

    @media (max-width: 780px) {
      .top-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 430px) {
      header {
        align-items: center;
      }

      .actions {
        grid-template-columns: 1fr;
      }

      .action {
        min-height: 68px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <header>
      <div>
        <h1>🏆 Achievementy<br>dospělosti</h1>
        <div class="subtitle">
          Společná liga běžného chaosu
        </div>
      </div>

      <div>
        <div id="connectionStatus" class="status">
          Připojuji…
        </div>

        <button
          class="ghost-button"
          type="button"
          onclick="openProfiles()"
        >
          👤 Profily
        </button>
      </div>
    </header>

    <div class="grid top-grid">
      <section class="card">
        <div class="section-header">
          <h2>Žebříček</h2>

          <button
            class="ghost-button"
            type="button"
            onclick="undoLastEvent()"
          >
            ↩ Vrátit poslední
          </button>
        </div>

        <div id="leaderboard"></div>
      </section>

      <section class="card">
        <h2>Přidat body</h2>

        <label for="memberSelect">Komu</label>
        <select id="memberSelect"></select>

        <label for="noteInput">Poznámka</label>
        <input
          id="noteInput"
          maxlength="150"
          placeholder="Co zase provedl/a?"
        >

        <div id="actions" class="actions"></div>
      </section>
    </div>

    <section class="card history-card">
      <div class="section-header">
        <h2>Poslední události</h2>

        <button
          class="ghost-button"
          type="button"
          onclick="loadData()"
        >
          🔄 Obnovit
        </button>
      </div>

      <div id="history" class="history"></div>
    </section>
  </main>

  <dialog id="pinDialog">
    <div class="pin-box">
      <h2>Společný PIN</h2>

      <p class="subtitle">
        PIN je potřeba pouze pro změny.
      </p>

      <input
        id="pinInput"
        class="pin-input"
        type="password"
        inputmode="numeric"
        maxlength="8"
        placeholder="••••"
      >

      <div class="modal-actions" style="justify-content:center">
        <button
          class="ghost-button"
          type="button"
          onclick="closePinDialog()"
        >
          Zrušit
        </button>

        <button
          class="primary-button"
          type="button"
          onclick="confirmPin()"
        >
          Odemknout
        </button>
      </div>
    </div>
  </dialog>

  <dialog id="profilesDialog">
    <div class="section-header">
      <div>
        <h2>Profily členů</h2>
        <div class="subtitle">
          Každý může změnit jméno a avatar.
        </div>
      </div>
    </div>

    <div id="profilesList"></div>

    <div class="modal-actions">
      <button
        class="ghost-button"
        type="button"
        onclick="profilesDialog.close()"
      >
        Zavřít
      </button>
    </div>
  </dialog>

  <dialog id="editProfileDialog">
    <h2>Upravit profil</h2>

    <input id="editMemberId" type="hidden">

    <label for="editName">Jméno</label>
    <input
      id="editName"
      maxlength="40"
      placeholder="Jméno"
    >

    <label for="editAvatar">Avatar</label>
    <input
      id="editAvatar"
      maxlength="300"
      placeholder="Emoji nebo odkaz na obrázek"
    >

    <div class="subtitle">
      Příklad emoji: 👩‍🦰<br>
      Nebo vlož přímý odkaz na obrázek.
    </div>

    <label for="editGender">Ocenění</label>
    <select id="editGender">
      <option value="woman">Super žena</option>
      <option value="man">Super muž</option>
      <option value="other">Bez rozlišení</option>
    </select>

    <div class="modal-actions">
      <button
        class="ghost-button"
        type="button"
        onclick="editProfileDialog.close()"
      >
        Zrušit
      </button>

      <button
        class="primary-button"
        type="button"
        onclick="saveProfile()"
      >
        Uložit
      </button>
    </div>
  </dialog>

  <div id="toast" class="toast"></div>

  <script>
    const SUPABASE_URL =
      "https://vmxmpnaaokpstnqvtytl.supabase.co";

    const SUPABASE_KEY =
      "sb_publishable_iMxPMJOymDacEI-_Q4tLig_GT5RAnFu";

    const database = supabase.createClient(
      SUPABASE_URL,
      SUPABASE_KEY
    );

    const categories = [
      {
        key: "food",
        icon: "🍕",
        label: "Fotka jídla",
        points: 2
      },
      {
        key: "alcohol",
        icon: "🍷",
        label: "Fotka alkoholu",
        points: 2
      },
      {
        key: "exercise",
        icon: "💪",
        label: "Cvičení",
        points: 5
      },
      {
        key: "illness",
        icon: "🤒",
        label: "Nemoc",
        points: 2
      },
      {
        key: "busy",
        icon: "😩",
        label: "Nic nestíhám",
        points: 3
      },
      {
        key: "work",
        icon: "💼",
        label: "Mám hodně práce",
        points: 4
      },
      {
        key: "property",
        icon: "🏠",
        label: "Práce na nemovitosti",
        points: 4
      },
      {
        key: "garden",
        icon: "🌿",
        label: "Práce na zahradě",
        points: 4
      },
      {
        key: "holiday",
        icon: "✈️",
        label: "Dovolená",
        points: 5
      },
      {
        key: "packing",
        icon: "🧳",
        label: "Balení na dovolenou",
        points: 4
      },
      {
        key: "selfie",
        icon: "📸",
        label: "Fotka při činnosti",
        points: 4
      },
      {
        key: "coffee",
        icon: "☕",
        label: "Kafe",
        points: 2
      },
      {
        key: "shopping",
        icon: "🛒",
        label: "Nákup",
        points: 2
      },
      {
        key: "persuasion",
        icon: "🗣️",
        label: "Přesvědčování ostatních",
        points: 4
      },
      {
        key: "discussion",
        icon: "🔥",
        label: "Divoká diskuze",
        points: 5
      },
      {
        key: "party",
        icon: "🎉",
        label: "Oslava nebo párty",
        points: 4
      }
    ];

    let members = [];
    let events = [];
    let pendingAction = null;

    let savedPin =
      sessionStorage.getItem("achievements_pin") || "";

    const pinDialog =
      document.getElementById("pinDialog");

    const profilesDialog =
      document.getElementById("profilesDialog");

    const editProfileDialog =
      document.getElementById("editProfileDialog");

    function escapeHtml(value) {
      return String(value ?? "").replace(
        /[&<>"']/g,
        character => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        })[character]
      );
    }

    function showToast(message) {
      const toast = document.getElementById("toast");

      toast.textContent = message;
      toast.classList.add("visible");

      window.setTimeout(() => {
        toast.classList.remove("visible");
      }, 2400);
    }

    function avatarHtml(value) {
      const avatar = value || "🙂";

      if (/^https?:\/\//i.test(avatar)) {
        return `
          <span class="avatar">
            <img
              src="${escapeHtml(avatar)}"
              alt="Avatar"
              onerror="this.parentElement.innerHTML='🙂'"
            >
          </span>
        `;
      }

      return `
        <span class="avatar">
          ${escapeHtml(avatar)}
        </span>
      `;
    }

    function memberTitle(member) {
      if (member.points >= 200) {
        if (member.gender === "woman") {
          return "👸 Super žena";
        }

        if (member.gender === "man") {
          return "🤴 Super muž";
        }

        return "👑 Legenda skupiny";
      }

      if (member.points >= 150) {
        return "💎 Mistr dospělosti";
      }

      if (member.points >= 100) {
        return "⭐ Manažer chaosu";
      }

      if (member.points >= 50) {
        return "🎯 Funkční dospělý";
      }

      if (member.points >= 20) {
        return "⚡ Rozjíždí se";
      }

      return "🌱 Sběrač bodů";
    }

    function levelProgress(points) {
      return Math.min(points % 50 * 2, 100);
    }

    function errorMessage(error) {
      const message = error?.message || "Nastala chyba.";

      if (message.includes("Špatný PIN")) {
        savedPin = "";
        sessionStorage.removeItem("achievements_pin");
        return "Špatný PIN.";
      }

      return message;
    }

    async function loadData() {
      const status =
        document.getElementById("connectionStatus");

      status.textContent = "Načítám…";
      status.classList.remove("online");

      const membersRequest = database
        .from("members")
        .select("*")
        .order("points", { ascending: false });

      const eventsRequest = database
        .from("events")
        .select(`
          id,
          member_id,
          category,
          label,
          event_icon,
          points,
          note,
          created_at,
          members (
            name,
            avatar
          )
        `)
        .order("created_at", { ascending: false })
        .limit(50);

      const [
        membersResponse,
        eventsResponse
      ] = await Promise.all([
        membersRequest,
        eventsRequest
      ]);

      if (
        membersResponse.error ||
        eventsResponse.error
      ) {
        status.textContent = "Chyba připojení";

        showToast(
          membersResponse.error?.message ||
          eventsResponse.error?.message
        );

        return;
      }

      members = membersResponse.data || [];
      events = eventsResponse.data || [];

      renderAll();

      status.textContent = "● Online";
      status.classList.add("online");
    }

    function renderAll() {
      renderLeaderboard();
      renderMemberSelect();
      renderActions();
      renderHistory();
    }

    function renderLeaderboard() {
      const leaderboard =
        document.getElementById("leaderboard");

      if (!members.length) {
        leaderboard.innerHTML =
          `<div class="empty">Zatím žádní členové.</div>`;
        return;
      }

      leaderboard.innerHTML = members
        .map((member, index) => {
          const medal =
            ["🥇", "🥈", "🥉"][index] || "";

          return `
            <div class="leader">
              ${avatarHtml(member.avatar)}

              <div>
                <div class="member-name">
                  ${medal} ${escapeHtml(member.name)}
                </div>

                <div class="member-title">
                  ${memberTitle(member)}
                </div>

                <div class="level-bar">
                  <div
                    class="level-progress"
                    style="width:${levelProgress(member.points)}%"
                  ></div>
                </div>
              </div>

              <div class="member-points">
                ${member.points} b
              </div>
            </div>
          `;
        })
        .join("");
    }

    function renderMemberSelect() {
      const select =
        document.getElementById("memberSelect");

      const previousValue = select.value;

      select.innerHTML = members
        .map(member => `
          <option value="${member.id}">
            ${escapeHtml(member.name)}
          </option>
        `)
        .join("");

      if (
        previousValue &&
        members.some(
          member =>
            String(member.id) === previousValue
        )
      ) {
        select.value = previousValue;
      }
    }

    function renderActions() {
      const actions =
        document.getElementById("actions");

      actions.innerHTML = categories
        .map(category => `
          <button
            class="action"
            type="button"
            onclick="addEvent('${category.key}')"
          >
            <span class="action-points">
              +${category.points}
            </span>

            <strong>
              ${category.icon}
              ${escapeHtml(category.label)}
            </strong>

            <small>Přidat událost</small>
          </button>
        `)
        .join("");
    }

    function renderHistory() {
      const history =
        document.getElementById("history");

      if (!events.length) {
        history.innerHTML = `
          <div class="empty">
            Zatím nic. Podezřele klidná skupina.
          </div>
        `;
        return;
      }

      history.innerHTML = events
        .map(event => {
          const memberName =
            event.members?.name || "Neznámý člen";

          const date = new Date(
            event.created_at
          ).toLocaleString("cs-CZ");

          return `
            <div class="event">
              <div>
                <strong>
                  ${escapeHtml(memberName)}
                </strong>

                –
                ${escapeHtml(event.event_icon)}
                ${escapeHtml(event.label)}

                ${
                  event.note
                    ? `
                      <div class="event-note">
                        ${escapeHtml(event.note)}
                      </div>
                    `
                    : ""
                }

                <div class="event-time">
                  ${date}
                </div>
              </div>

              <div class="event-points">
                +${event.points}
              </div>
            </div>
          `;
        })
        .join("");
    }

    function requirePin(action) {
      if (savedPin) {
        action();
        return;
      }

      pendingAction = action;

      document.getElementById("pinInput").value = "";
      pinDialog.showModal();

      window.setTimeout(() => {
        document.getElementById("pinInput").focus();
      }, 100);
    }

    function closePinDialog() {
      pendingAction = null;
      pinDialog.close();
    }

    async function confirmPin() {
      const pin =
        document.getElementById("pinInput").value;

      const response = await database.rpc(
        "check_pin",
        {
          p_pin: pin
        }
      );

      if (response.error || !response.data) {
        showToast("Špatný PIN.");
        return;
      }

      savedPin = pin;

      sessionStorage.setItem(
        "achievements_pin",
        pin
      );

      pinDialog.close();
      showToast("Aplikace je odemčená.");

      const action = pendingAction;
      pendingAction = null;

      if (action) {
        action();
      }
    }

    function addEvent(categoryKey) {
      requirePin(async () => {
        const category = categories.find(
          item => item.key === categoryKey
        );

        const memberId = Number(
          document.getElementById(
            "memberSelect"
          ).value
        );

        const note =
          document.getElementById(
            "noteInput"
          ).value.trim();

        const response = await database.rpc(
          "add_event",
          {
            p_pin: savedPin,
            p_member_id: memberId,
            p_category: category.key,
            p_label: category.label,
            p_event_icon: category.icon,
            p_points: category.points,
            p_note: note
          }
        );

        if (response.error) {
          showToast(errorMessage(response.error));
          return;
        }

        document.getElementById(
          "noteInput"
        ).value = "";

        const messages = [
          "Body připsány. Dospělost opět zvítězila.",
          "Zapsáno. Chaos pokračuje.",
          "Další úspěch běžného života.",
          "Žebříček se právě otřásl."
        ];

        showToast(
          messages[
            Math.floor(
              Math.random() * messages.length
            )
          ]
        );

        await loadData();
      });
    }

    function openProfiles() {
      const list =
        document.getElementById("profilesList");

      list.innerHTML = members
        .map(member => `
          <div class="profile-row">
            ${avatarHtml(member.avatar)}

            <div>
              <div class="member-name">
                ${escapeHtml(member.name)}
              </div>

              <div class="member-title">
                ${memberTitle(member)}
              </div>
            </div>

            <button
              class="ghost-button"
              type="button"
              onclick="openEditProfile(${member.id})"
            >
              Upravit
            </button>
          </div>
        `)
        .join("");

      profilesDialog.showModal();
    }

    function openEditProfile(memberId) {
      const member = members.find(
        item => item.id === memberId
      );

      if (!member) {
        return;
      }

      document.getElementById(
        "editMemberId"
      ).value = member.id;

      document.getElementById(
        "editName"
      ).value = member.name;

      document.getElementById(
        "editAvatar"
      ).value = member.avatar || "🙂";

      document.getElementById(
        "editGender"
      ).value = member.gender || "other";

      editProfileDialog.showModal();
    }

    function saveProfile() {
      requirePin(async () => {
        const memberId = Number(
          document.getElementById(
            "editMemberId"
          ).value
        );

        const name =
          document.getElementById(
            "editName"
          ).value.trim();

        const avatar =
          document.getElementById(
            "editAvatar"
          ).value.trim();

        const gender =
          document.getElementById(
            "editGender"
          ).value;

        if (!name) {
          showToast("Jméno nesmí být prázdné.");
          return;
        }

        const response = await database.rpc(
          "update_member",
          {
            p_pin: savedPin,
            p_member_id: memberId,
            p_name: name,
            p_avatar: avatar,
            p_gender: gender
          }
        );

        if (response.error) {
          showToast(errorMessage(response.error));
          return;
        }

        editProfileDialog.close();
        profilesDialog.close();

        showToast("Profil uložen.");

        await loadData();
      });
    }

    function undoLastEvent() {
      requirePin(async () => {
        const confirmed = window.confirm(
          "Opravdu vrátit úplně poslední bodovanou událost?"
        );

        if (!confirmed) {
          return;
        }

        const response = await database.rpc(
          "undo_last_event",
          {
            p_pin: savedPin
          }
        );

        if (response.error) {
          showToast(errorMessage(response.error));
          return;
        }

        showToast("Poslední událost byla vrácena.");

        await loadData();
      });
    }

    document
      .getElementById("pinInput")
      .addEventListener("keydown", event => {
        if (event.key === "Enter") {
          confirmPin();
        }
      });

    loadData();

    window.setInterval(() => {
      loadData();
    }, 15000);
  </script>
</body>
                                          </html>
